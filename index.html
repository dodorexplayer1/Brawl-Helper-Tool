<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Brawl Helper Tool V3</title>

<style>
body {
    font-family: Arial;
    background: #0b0b0b;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 {
    margin-top: 10px;
    color: #4dff88;
}

select, button {
    padding: 10px;
    margin: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
}

button {
    background: #4dff88;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.card {
    background: #1c1c1c;
    padding: 20px;
    margin-top: 20px;
    border-radius: 12px;
    display: inline-block;
    min-width: 320px;
    max-width: 90%;
    text-align: left;
}

.good { color: #4dff88; }
.bad { color: #ff4d4d; }
.info { color: #ffd24d; }
.small { font-size: 13px; opacity: 0.8; }
</style>

</head>

<body>

<h1>🔥 Brawl Helper Tool V3</h1>
<p class="small">Counter + Star Powers + Gadgets + Hypercharge System</p>

<select id="brawlerSelect"></select>
<br>
<button onclick="analyze()">Analyse starten</button>

<div id="result" class="card">Wähle einen Brawler</div>

<script>

// =========================
// 🎮 BRAWLER DATABASE V3
// =========================

const brawlers = [
    { name: "Shelly", damage: 8, range: 4, hp: 7, speed: 6, role: "Shotgun", sp: "Shell Shock", gadget: "Fast Heal", hyper: false },
    { name: "Colt", damage: 9, range: 9, hp: 4, speed: 7, role: "Shooter", sp: "Slick Boots", gadget: "Reload Boost", hyper: true },
    { name: "Bull", damage: 9, range: 2, hp: 10, speed: 6, role: "Tank", sp: "Tough Guy", gadget: "Stun Dash", hyper: false },
    { name: "Nita", damage: 6, range: 5, hp: 7, speed: 6, role: "Control", sp: "Bear With Me", gadget: "Bear Shield", hyper: false },
    { name: "Piper", damage: 10, range: 10, hp: 3, speed: 6, role: "Sniper", sp: "Snappy Sniping", gadget: "Escape Shot", hyper: true },
    { name: "Leon", damage: 8, range: 5, hp: 5, speed: 10, role: "Assassin", sp: "Invisibility Heal", gadget: "Smoke Bomb", hyper: true },
    { name: "Spike", damage: 9, range: 7, hp: 4, speed: 7, role: "Control", sp: "Fertilize", gadget: "Spike Field", hyper: true }
];

// =========================
// 🔄 DROPDOWN
// =========================

const select = document.getElementById("brawlerSelect");

brawlers.forEach(b => {
    let opt = document.createElement("option");
    opt.value = b.name;
    opt.innerText = b.name;
    select.appendChild(opt);
});

// =========================
// 🧠 V3 COUNTER ENGINE
// =========================

function analyze() {

    const name = select.value;
    const b = brawlers.find(x => x.name === name);

    let strengths = [];
    let weaknesses = [];

    brawlers.forEach(enemy => {

        if (enemy.name === b.name) return;

        let score = 0;

        // BASIC STATS
        if (b.range > enemy.range) score += 2;
        else score -= 2;

        if (b.damage > enemy.damage) score += 1;
        else score -= 1;

        if (b.hp > enemy.hp) score += 1;
        else score -= 1;

        if (b.speed > enemy.speed) score += 0.5;
        else score -= 0.5;

        // ROLE SYSTEM
        if (b.role === "Tank" && enemy.role === "Sniper") score += 2;
        if (b.role === "Sniper" && enemy.role === "Tank") score -= 2;
        if (b.role === "Assassin" && enemy.role === "Shooter") score += 1;

        // ⭐ STAR POWER BONUS
        if (b.sp.includes("Heal")) score += 0.5;
        if (b.sp.includes("Sniping")) score += 0.5;

        // 🎮 GADGET BONUS
        if (b.gadget.includes("Shield")) score += 0.5;
        if (b.gadget.includes("Dash")) score += 0.5;

        // ⚡ HYPERCHARGE BOOST
        if (b.hyper) score += 1;

        // RESULT
        if (score >= 2) {
            strengths.push(`${enemy.name} <span class="info">(+${score.toFixed(1)})</span>`);
        } 
        else if (score <= -2) {
            weaknesses.push(`${enemy.name} <span class="info">(${score.toFixed(1)})</span>`);
        }
    });

    document.getElementById("result").innerHTML = `
        <h2>${b.name}</h2>

        <p><b>Rolle:</b> ${b.role}</p>

        <p class="good"><b>Stark gegen:</b><br>${strengths.join("<br>") || "Keine Daten"}</p>

        <p class="bad"><b>Schwach gegen:</b><br>${weaknesses.join("<br>") || "Keine Daten"}</p>

        <hr>

        <p class="info"><b>Star Power:</b> ${b.sp}</p>
        <p class="info"><b>Gadget:</b> ${b.gadget}</p>
        <p class="info"><b>Hypercharge:</b> ${b.hyper ? "Ja ⚡" : "Nein"}</p>
    `;
}

</script>

</body>
</html>
