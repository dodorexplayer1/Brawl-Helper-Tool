<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Brawl Helper Tool V3.5</title>

<style>
body {
    font-family: Arial;
    background: #0a0a0a;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 { color: #4dff88; }

select, button {
    padding: 10px;
    margin: 6px;
    border-radius: 8px;
    border: none;
}

button {
    background: #4dff88;
    font-weight: bold;
    cursor: pointer;
    color: black;
}

.card {
    background: #1b1b1b;
    padding: 20px;
    border-radius: 14px;
    margin-top: 20px;
    display: inline-block;
    min-width: 360px;
    max-width: 95%;
    text-align: left;
}

.good { color: #4dff88; }
.bad { color: #ff4d4d; }
.info { color: #ffd24d; }

.small {
    font-size: 12px;
    opacity: 0.7;
}
</style>

</head>

<body>

<h1>🔥 Brawl Helper Tool V3.5</h1>
<p class="small">Team Builder System (3v3 Meta)</p>

<div id="team"></div>

<button onclick="analyzeTeam()">Team Analyse</button>

<div id="result" class="card">Wähle dein Team</div>

<script>

//
// =========================
// 📦 BRAWLER DATA
// =========================
//

const BRAWLERS = [
    create("Shelly", "Shotgun"),
    create("Colt", "Shooter"),
    create("Bull", "Tank"),
    create("Nita", "Control"),
    create("Piper", "Sniper"),
    create("Leon", "Assassin"),
    create("Spike", "Control")
];

function create(name, role) {
    return {
        name,
        role,
        stats: {
            dmg: Math.random()*10,
            rng: Math.random()*10,
            hp: Math.random()*10,
            spd: Math.random()*10
        }
    };
}

//
// =========================
// 🧩 TEAM SELECTOR UI
// =========================
//

const teamDiv = document.getElementById("team");

let selects = [];

for (let i = 0; i < 3; i++) {

    let sel = document.createElement("select");

    BRAWLERS.forEach(b => {
        let opt = document.createElement("option");
        opt.value = b.name;
        opt.innerText = b.name;
        sel.appendChild(opt);
    });

    selects.push(sel);
    teamDiv.appendChild(sel);
}

//
// =========================
// 🧠 TEAM ENGINE V3.5
// =========================
//

function analyzeTeam() {

    let team = selects.map(s =>
        BRAWLERS.find(b => b.name === s.value)
    );

    let roles = {};
    let score = 0;

    for (let b of team) {

        roles[b.role] = (roles[b.role] || 0) + 1;

        // base team power
        score += (b.stats.dmg + b.stats.rng + b.stats.hp + b.stats.spd) / 4;
    }

    // =========================
    // 🤝 SYNERGY SYSTEM
    // =========================

    let synergy = 0;

    // Tank + Support synergy
    if (roles["Tank"] && roles["Control"]) synergy += 5;

    // Assassin comp bonus
    if (roles["Assassin"] >= 1) synergy += 3;

    // Sniper protection needed check
    if (roles["Sniper"] && !roles["Tank"]) synergy -= 3;

    let total = score + synergy;

    let rating = "Normal";

    if (total > 25) rating = "🔥 OP TEAM";
    else if (total > 18) rating = "🟢 Strong Team";
    else if (total < 12) rating = "🔴 Weak Team";

    document.getElementById("result").innerHTML = `
        <h2>Team Analyse</h2>

        <p class="info"><b>Team Rating:</b> ${rating}</p>

        <p><b>Rollen:</b><br>
        ${team.map(t => t.role).join(", ")}
        </p>

        <hr>

        <p class="good"><b>Team Power:</b> ${score.toFixed(1)}</p>

        <p class="info"><b>Synergy Bonus:</b> ${synergy}</p>

        <p class="bad"><b>Weakness Check:</b>
        ${roles["Sniper"] && !roles["Tank"] ? "Keine Tank-Protection!" : "OK"}
        </p>

        <hr>

        <p class="small">V3.5 Team System Active</p>
    `;
}

</script>

</body>
</html>
