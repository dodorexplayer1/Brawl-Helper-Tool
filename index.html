<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Brawl Ranked Tool</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

.nav{
background:#111;
padding:10px;
display:flex;
justify-content:space-between;
}

button{
background:#1b1b1b;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

/* LAYOUT */
.container{
display:flex;
height:90vh;
}

.left{
width:25%;
background:#111;
padding:10px;
overflow-y:auto;
}

.center{
width:75%;
padding:10px;
}

.search{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

/* BRAWLER */
.brawler{
background:#1b1b1b;
padding:8px;
margin:5px 0;
border-radius:8px;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
}

.brawler img{
width:40px;
height:40px;
border-radius:6px;
}

/* TEAMS */
.team{
display:flex;
justify-content:center;
margin:20px;
}

.slot{
width:120px;
height:120px;
background:#1b1b1b;
margin:10px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
flex-direction:column;
}

.slot img{
width:60px;
height:60px;
}

.enemy{border:2px solid red;}
.ally{border:2px solid green;}

/* PANEL */
.panel{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:12px;
display:none;
}
</style>
</head>

<body>

<div class="nav">
<div>🏆 Ranked</div>
<button onclick="openSettings()">⚙️</button>
</div>

<div class="container">

<!-- LEFT -->
<div class="left">
<input id="search" class="search" placeholder="Suchen..." oninput="renderList()">
<div id="brawlerList"></div>
</div>

<!-- CENTER -->
<div class="center">

<h2>🔴 Gegner</h2>
<div class="team" id="enemyTeam">
<div class="slot enemy" onclick="selectSlot('enemy',0)">?</div>
<div class="slot enemy" onclick="selectSlot('enemy',1)">?</div>
<div class="slot enemy" onclick="selectSlot('enemy',2)">?</div>
</div>

<h2>🟢 Dein Team</h2>
<div class="team" id="allyTeam">
<div class="slot ally" onclick="selectSlot('ally',0)">?</div>
<div class="slot ally" onclick="selectSlot('ally',1)">?</div>
<div class="slot ally" onclick="selectSlot('ally',2)">?</div>
</div>

<h3>⭐ Empfohlen (baust du selbst)</h3>
<div id="recommend"></div>

</div>

</div>

<!-- SETTINGS PANEL -->
<div id="panel" class="panel">

<h3>🔐 Admin Login</h3>
<input id="pass" placeholder="Passwort"><br><br>
<button onclick="login()">Login</button>

<div id="adminArea" style="display:none;">
<h3>⬆️ Brawler hinzufügen</h3>
<input id="name" placeholder="Name"><br><br>
<input type="file" id="img"><br><br>
<button onclick="addBrawler()">Hinzufügen</button>
</div>

</div>

<script>

/* ADMIN */
let isAdmin=false;
const PASSWORD="1234"; // 👉 kannst du ändern

/* DATA */
let BRAWLERS=JSON.parse(localStorage.getItem("brawlers")||"[]");

/* STATE */
let selectedSlot=null;
let enemy=[null,null,null];
let ally=[null,null,null];

/* SETTINGS */
function openSettings(){
panel.style.display="block";
}

function login(){
if(pass.value===PASSWORD){
isAdmin=true;
adminArea.style.display="block";
}
}

/* ADD BRAWLER */
function addBrawler(){

if(!isAdmin) return;

let file=img.files[0];
let reader=new FileReader();

reader.onload=function(){

BRAWLERS.push({
name:name.value,
img:reader.result
});

localStorage.setItem("brawlers",JSON.stringify(BRAWLERS));

renderList();

};

reader.readAsDataURL(file);

}

/* SELECT SLOT */
function selectSlot(team,index){
selectedSlot={team,index};
}

/* PICK */
function pickBrawler(b){

if(!selectedSlot)return;

if(selectedSlot.team==="enemy"){
enemy[selectedSlot.index]=b;
}else{
ally[selectedSlot.index]=b;
}

updateUI();

}

/* UPDATE UI */
function updateUI(){

let e=document.querySelectorAll("#enemyTeam .slot");
let a=document.querySelectorAll("#allyTeam .slot");

e.forEach((s,i)=>{
if(enemy[i]){
s.innerHTML=`<img src="${enemy[i].img}"><br>${enemy[i].name}`;
}else s.innerHTML="?";
});

a.forEach((s,i)=>{
if(ally[i]){
s.innerHTML=`<img src="${ally[i].img}"><br>${ally[i].name}`;
}else s.innerHTML="?";
});

}

/* RENDER */
function renderList(){

let val=search.value.toLowerCase();

brawlerList.innerHTML=BRAWLERS
.filter(b=>b.name.toLowerCase().includes(val))
.map(b=>`
<div class="brawler" onclick='pickBrawler(${JSON.stringify(b)})'>
<img src="${b.img}">
${b.name}
</div>
`).join("");

}

renderList();

</script>

</body>
</html>
