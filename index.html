<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Brawl Helper Tool V1.6</title>

<style>
body {
    font-family: Arial;
    background: #0a0a0a;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 { color: #4dff88; }

select, button {
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
}

button {
    background: #4dff88;
    font-weight: bold;
    cursor: pointer;
}

.card {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
    display: inline-block;
    min-width: 340px;
    max-width: 95%;
    text-align: left;
}

.good { color: #4dff88; }
.bad { color: #ff4d4d; }
.info { color: #ffd24d; }
.small { font-size: 12px; opacity: 0.7; }
</style>

</head>

<body>

<h1>🔥 Brawl Helper Tool V1.6</h1>
<p class="small">Clean Structure Update</p>

<select id="brawlerSelect"></select>
<br>
<button onclick="analyze()">Analyse starten</button>

<div id="result" class="card">Wähle einen Brawler</div>

<script>

// =========================
// 🎮 CLEAN BRAWLER STRUCTURE
// =========================

const brawlers = [
    createBrawler("Shelly", 8, 4, 7, 6, "Shotgun"),
    createBrawler("Colt", 9, 9, 4, 7, "Shooter"),
    createBrawler("Bull", 9, 2, 10, 6, "Tank"),
    createBrawler("Nita", 6, 5, 7, 6, "Control"),
    createBrawler("Piper", 10, 10, 3, 6, "Sniper"),
    createBrawler("Leon", 8, 5, 5, 10, "Assassin"),
    createBrawler("Spike", 9, 7, 4, 7, "Control")
];

// 🧠 FACTORY FUNCTION (WICHTIG FÜR 101 BRAWLER)
function createBrawler(name, dmg, rng, hp, spd, role) {
    return { name, dmg, rng, hp, spd, role };
}

// =========================
// 🔄 DROPDOWN
// =========================

const select = document.getElementById("brawlerSelect");

brawlers.forEach(b => {
    const opt = document.createElement("option");
    opt.value = b.name;
    opt.innerText = b.name;
    select.appendChild(opt);
});

// =========================
// 🧠 COUNTER ENGINE (CLEAN V1.6)
// =========================

function analyze() {

    const b = brawlers.find(x => x.name === select.value);

    let strengths = [];
    let weaknesses = [];
    let bestCounters = [];

    let totalScore = 0;

    for (let enemy of brawlers) {

        if (enemy.name === b.name) continue;

        let score =
            (b.rng - enemy.rng) * 2 +
            (b.dmg - enemy.dmg) * 1.2 +
            (b.hp - enemy.hp) * 1.1 +
            (b.spd - enemy.spd) * 0.5;

        // ROLE SYSTEM CLEAN
        if (b.role === "Tank" && enemy.role === "Sniper") score += 2;
        if (b.role === "Sniper" && enemy.role === "Tank") score -= 2;
        if (b.role === "Assassin" && enemy.role === "Shooter") score += 1;

        totalScore += score;

        if (score >= 2) {
            strengths.push(`${enemy.name} (+${score.toFixed(1)})`);
        } 
        else if (score <= -2) {
            weaknesses.push(`${enemy.name} (${score.toFixed(1)})`);
            bestCounters.push(enemy.name);
        }
    }

    let rating = "Normal";
    if (totalScore > 10) rating = "🔥 OP Meta";
    else if (totalScore > 5) rating = "🟢 Strong";
    else if (totalScore < -5) rating = "🔴 Weak";

    document.getElementById("result").innerHTML = `
        <h2>${b.name}</h2>

        <p><b>Rolle:</b> ${b.role}</p>

        <p class="info"><b>Meta:</b> ${rating}</p>

        <p class="good"><b>Stark gegen:</b><br>${strengths.join("<br>") || "Keine Daten"}</p>

        <p class="bad"><b>Schwach gegen:</b><br>${weaknesses.join("<br>") || "Keine Daten"}</p>

        <hr>

        <p class="info"><b>Beste Counter:</b><br>${bestCounters.slice(0,3).join(", ") || "Keine Daten"}</p>

        <p class="small">Score: ${totalScore.toFixed(1)}</p>
    `;
}

</script>

</body>
</html>
