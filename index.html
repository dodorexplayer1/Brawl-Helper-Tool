<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Brawl Helper Tool V8.5</title>

<style>
body{
font-family:Arial;
background:#0a0a0a;
color:white;
margin:0;
}

.nav{
display:flex;
justify-content:space-around;
background:#111;
padding:10px;
position:sticky;
top:0;
}

.nav button{
background:#1b1b1b;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.page{display:none;padding:20px;}
.active{display:block;}

.card{
background:#1b1b1b;
padding:15px;
border-radius:12px;
margin:10px;
}

.tag{
padding:3px 6px;
background:#333;
border-radius:6px;
font-size:12px;
margin-left:5px;
}
</style>
</head>

<body>

<div class="nav">
<button onclick="go('home')">🏠 Home</button>
<button onclick="go('team')">🧑‍🤝‍🧑 Team</button>
<button onclick="go('analyze')">🧠 Analyse</button>
</div>

<h2 style="text-align:center;color:#4dff88;">🔥 V8.5 FULL META SYSTEM</h2>

<!-- HOME -->
<div id="home" class="page active">

<div class="card">
<h3>📊 BRAWLER SYSTEM READY</h3>
<p>Counter + Meta + Team AI aktiv</p>
</div>

</div>

<!-- TEAM FINDER -->
<div id="team" class="page">

<div class="card">
<h3>🧑‍🤝‍🧑 TEAM BUILDER</h3>

<button onclick="showTeam()">Auto Team erstellen</button>

<div id="teamOut"></div>

</div>

</div>

<!-- ANALYZE -->
<div id="analyze" class="page">

<div class="card">
<h3>🧠 META ANALYSE</h3>

<input id="enemy" placeholder="Enemy Brawler z.B. Colt">

<button onclick="analyzeEnemy()">Analyse</button>

<div id="out"></div>

</div>

</div>

<script>

/* =========================
   NAV
========================= */
function go(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* =========================
   BRAWLER DATA (1–10)
========================= */
const BRAWLERS=[
"Shelly","Nita","Colt","Bull","Brock",
"El Primo","Barley","Poco","Rosa","Jessie"
];

/* =========================
   COUNTERS
========================= */
const COUNTERS={
"Shelly":["Colt","Brock"],
"Colt":["Bull","Edgar"],
"Bull":["Shelly"],
"Brock":["Edgar","Mortis"],
"Barley":["Crow","Edgar"],
"Poco":["Colt","Brock"],
"Rosa":["Colt","Spike"],
"Jessie":["Piper","Brock"]
};

/* =========================
   META TIERS
========================= */
const META={
"Shelly":"A",
"Nita":"B",
"Colt":"S",
"Bull":"B",
"Brock":"S",
"El Primo":"B",
"Barley":"B",
"Poco":"A",
"Rosa":"A",
"Jessie":"A"
};

/* =========================
   TEAM BUILDER
========================= */
function showTeam(){

let team={
tank:null,
dps:null,
support:null
};

BRAWLERS.forEach(b=>{

if(b==="Bull"||b==="El Primo"||b==="Rosa") team.tank=b;
if(b==="Colt"||b==="Brock") team.dps=b;
if(b==="Poco"||b==="Jessie") team.support=b;

});

teamOut.innerHTML=`
<div class="card">
🛡 Tank: ${team.tank}<br>
⚔ DPS: ${team.dps}<br>
💚 Support: ${team.support}
</div>
`;

}

/* =========================
   COUNTER ANALYZER
========================= */
function analyzeEnemy(){

let e=enemy.value;

let counters=COUNTERS[e]||["No Data"];

out.innerHTML=`
<div class="card">
🎯 Enemy: ${e}<br>
🔥 Best Counters:<br>
${counters.map(c=>"• "+c).join("<br>")}
<br><br>
📊 Meta Tier: ${META[e]||"Unknown"}
</div>
`;

}

</script>

</body>
</html>
