<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Brawl Helper Tool V2</title>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 {
    margin-top: 10px;
}

select, button {
    padding: 10px;
    margin: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
}

button {
    cursor: pointer;
    background: #4dff88;
    color: black;
    font-weight: bold;
}

.card {
    background: #1e1e1e;
    padding: 20px;
    margin-top: 20px;
    border-radius: 12px;
    display: inline-block;
    min-width: 320px;
    max-width: 90%;
    text-align: left;
}

.good {
    color: #4dff88;
}

.bad {
    color: #ff4d4d;
}

.score {
    color: #ffd24d;
}
</style>

</head>

<body>

<h1>🔥 Brawl Helper Tool V2</h1>

<p>Wähle deinen Brawler und analysiere Matchups</p>

<select id="brawlerSelect"></select>
<br>
<button onclick="analyze()">Analyse starten</button>

<div id="result" class="card">Wähle einen Brawler</div>

<script>

// =========================
// 🎮 BRAWLER DATENBANK
// =========================

const brawlers = [
    { name: "Shelly", damage: 8, range: 4, hp: 7, speed: 6, role: "Shotgun" },
    { name: "Colt", damage: 9, range: 9, hp: 4, speed: 7, role: "Shooter" },
    { name: "Bull", damage: 9, range: 2, hp: 10, speed: 6, role: "Tank" },
    { name: "Nita", damage: 6, range: 5, hp: 7, speed: 6, role: "Control" },
    { name: "Piper", damage: 10, range: 10, hp: 3, speed: 6, role: "Sniper" },
    { name: "Leon", damage: 8, range: 5, hp: 5, speed: 10, role: "Assassin" },
    { name: "Spike", damage: 9, range: 7, hp: 4, speed: 7, role: "Control" }
];

// =========================
// 🔄 DROPDOWN
// =========================

const select = document.getElementById("brawlerSelect");

brawlers.forEach(b => {
    let opt = document.createElement("option");
    opt.value = b.name;
    opt.innerText = b.name;
    select.appendChild(opt);
});

// =========================
// 🧠 COUNTER SYSTEM V2
// =========================

function analyze() {

    const name = select.value;
    const b = brawlers.find(x => x.name === name);

    let strengths = [];
    let weaknesses = [];

    brawlers.forEach(enemy => {

        if (enemy.name === b.name) return;

        let score = 0;

        // 📏 RANGE
        if (b.range > enemy.range) score += 2;
        else score -= 2;

        // 💥 DAMAGE
        if (b.damage > enemy.damage) score += 1;
        else score -= 1;

        // ❤️ HP
        if (b.hp > enemy.hp) score += 1;
        else score -= 1;

        // ⚡ SPEED
        if (b.speed > enemy.speed) score += 0.5;
        else score -= 0.5;

        // 🧠 ROLE MATCHUPS
        if (b.role === "Tank" && enemy.role === "Sniper") score += 2;
        if (b.role === "Sniper" && enemy.role === "Tank") score -= 2;

        if (b.role === "Assassin" && enemy.role === "Shooter") score += 1;
        if (b.role === "Shooter" && enemy.role === "Assassin") score -= 1;

        if (b.role === "Control" && enemy.role === "Tank") score += 1;

        // 📊 RESULT
        if (score >= 2) {
            strengths.push(`${enemy.name} <span class="score">(+${score.toFixed(1)})</span>`);
        }

        if (score <= -2) {
            weaknesses.push(`${enemy.name} <span class="score">(${score.toFixed(1)})</span>`);
        }
    });

    document.getElementById("result").innerHTML = `
        <h2>${b.name}</h2>
        <p><b>Rolle:</b> ${b.role}</p>

        <p class="good"><b>Stark gegen:</b><br>${strengths.join("<br>") || "Keine Daten"}</p>

        <p class="bad"><b>Schwach gegen:</b><br>${weaknesses.join("<br>") || "Keine Daten"}</p>
    `;
}

</script>

</body>
</html>
