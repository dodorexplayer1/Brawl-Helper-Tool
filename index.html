<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brawl Draft AI v3</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
}

input,button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{
  background:#3b82f6;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}

.small{
  font-size:13px;
  opacity:0.8;
}

.adminBox{
  background:#1f2937;
  padding:15px;
  border-radius:12px;
  margin-top:20px;
}

.hidden{display:none;}

.tag{
  display:inline-block;
  padding:4px 8px;
  background:#374151;
  border-radius:6px;
  margin:3px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎮 Brawl Draft AI v3</h1>

<p class="small">Enter enemy brawlers (comma separated)</p>

<input id="enemy" placeholder="e.g. Piper, Bull, Mortis">

<button onclick="getPick()">🔥 Best Counter Pick</button>

<div id="result" class="card"></div>

<button onclick="toggleAdmin()">⚙ Admin Panel</button>

<div id="admin" class="adminBox hidden">

<h3>➕ Add / Update Brawler</h3>

<input id="name" placeholder="Name">
<input id="role" placeholder="Role (tank/sniper/assassin/support/controller)">
<input id="weak" placeholder="Weak vs (comma)">
<input id="strong" placeholder="Strong vs (comma)">
<input id="gadget" placeholder="Gadgets (comma)">
<input id="star" placeholder="Star Powers (comma)">
<input id="hyper" placeholder="Hypercharge">

<button onclick="saveBrawler()">Save / Update</button>

</div>

</div>

<script>

/* =========================
   CORE DATABASE (STARTER + 101 READY)
========================= */

let brawlers = [
{
name:"Shelly",
role:"tank_counter",
weak:["sniper"],
strong:["tank"],
gadgets:["Fast Forward","Clay Pigeons"],
starpowers:["Shell Shock","Band Aid"],
hypercharge:"Shock Blast"
},
{
name:"Piper",
role:"sniper",
weak:["assassin"],
strong:["tank"],
gadgets:["Auto Aimer","Snappy Shot"],
starpowers:["Ambush","Snappy Reload"],
hypercharge:"Long Shot Fury"
},
{
name:"Mortis",
role:"assassin",
weak:["burst"],
strong:["sniper"],
gadgets:["Coiled Snake","Combo Spinner"],
starpowers:["Creepy Harvest","Coiled Snake"],
hypercharge:"Shadow Dash"
}
];

/* =========================
   FIND FUNCTION
========================= */

function find(name){
return brawlers.find(b =>
b.name.toLowerCase() === name.toLowerCase()
);
}

/* =========================
   AI PICK SYSTEM
========================= */

function getPick(){

let enemies = enemy.value.toLowerCase().split(",");

let best = "Spike (default)";
let reason = "Balanced pick for most situations";

let scoreMap = {};

for(let e of enemies){
e = e.trim();

brawlers.forEach(b => {

if(!scoreMap[b.name]) scoreMap[b.name] = 0;

if(b.weak.includes(e)) scoreMap[b.name] += 3;
if(b.strong.includes(e)) scoreMap[b.name] += 1;

});

}

/* FIND BEST SCORE */
let top = 0;

for(let b in scoreMap){
if(scoreMap[b] > top){
top = scoreMap[b];
best = b;
}
}

reason = "Counter advantage score: "+top;

let b = find(best);

result.innerHTML = `
🔥 Best Pick: <b>${best}</b><br><br>
🧠 ${reason}<br><br>

<span class="tag">Role: ${b?.role || "unknown"}</span><br>
<span class="tag">Gadgets: ${(b?.gadgets||[]).join(", ")}</span><br>
<span class="tag">Star Powers: ${(b?.starpowers||[]).join(", ")}</span><br>
<span class="tag">Hypercharge: ${b?.hypercharge || "none"}</span>
`;

}

/* =========================
   ADMIN SYSTEM
========================= */

function toggleAdmin(){
admin.classList.toggle("hidden");
}

function saveBrawler(){

let newB = {
name:name.value,
role:role.value,
weak:weak.value.split(",").map(x=>x.trim()),
strong:strong.value.split(",").map(x=>x.trim()),
gadgets:gadget.value.split(",").map(x=>x.trim()),
starpowers:star.value.split(",").map(x=>x.trim()),
hypercharge:hyper.value
};

let existing = find(newB.name);

if(existing){
Object.assign(existing,newB);
alert("Updated!");
}else{
brawlers.push(newB);
alert("Added!");
}

}

</script>

</body>
</html>
