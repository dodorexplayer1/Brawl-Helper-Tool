<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ranked System V14</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* NAV */
.nav{
background:#111;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{font-size:18px;}

.adminState{
font-size:12px;
color:#aaa;
margin-left:10px;
}

/* BUTTONS */
button{
background:#1b1b1b;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin:3px;
}

/* LAYOUT */
.container{
display:flex;
height:90vh;
}

/* LEFT */
.left{
width:25%;
background:#111;
padding:10px;
overflow-y:auto;
padding-top:60px;
}

/* ADMIN TOOLBAR */
#adminTools{
position:absolute;
top:10px;
left:10px;
right:10px;
display:none;
background:#0f0f0f;
padding:5px;
border-radius:8px;
z-index:10;
}

/* SEARCH */
.search{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:none;
margin-top:10px;
}

/* BRAWLER */
.brawler{
background:#1b1b1b;
padding:8px;
margin:5px 0;
border-radius:8px;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
position:relative;
}

.brawler img{
width:40px;
height:40px;
border-radius:6px;
}

/* ICONS */
.icon{
position:absolute;
top:4px;
right:4px;
display:flex;
gap:4px;
}

.icon button{
font-size:10px;
padding:2px 5px;
border-radius:4px;
background:#333;
}

/* CENTER */
.center{
width:75%;
padding:10px;
}

/* TEAMS */
.team{
display:flex;
justify-content:center;
margin:20px;
}

.slot{
width:120px;
height:120px;
background:#1b1b1b;
margin:10px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
flex-direction:column;
cursor:pointer;
}

.slot img{
width:60px;
height:60px;
}

.enemy{border:2px solid red;}
.ally{border:2px solid green;}

/* PANEL */
.panel{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:12px;
display:none;
width:320px;
z-index:20;
}

/* CLOSE BUTTON */
.closeBtn{
position:absolute;
top:10px;
right:10px;
background:#333;
border:none;
color:white;
border-radius:6px;
padding:4px 8px;
cursor:pointer;
}

input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:none;
}

.info{
font-size:12px;
color:#aaa;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">

<div class="title">
🏆 Ranked V14 System
<span id="adminState" class="adminState">❌ Offline</span>
</div>

<div>
<button onclick="togglePanel()">⚙️</button>
<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
</div>

</div>

<div class="container">

<!-- LEFT -->
<div class="left">

<div id="adminTools"></div>

<input id="search" class="search" placeholder="Brawler suchen..." oninput="renderList()">

<div id="brawlerList"></div>

</div>

<!-- CENTER -->
<div class="center">

<h2>🔴 Gegner</h2>
<div class="team" id="enemyTeam">
<div class="slot enemy" onclick="selectSlot('enemy',0)">?</div>
<div class="slot enemy" onclick="selectSlot('enemy',1)">?</div>
<div class="slot enemy" onclick="selectSlot('enemy',2)">?</div>
</div>

<h2>🟢 Dein Team</h2>
<div class="team" id="allyTeam">
<div class="slot ally" onclick="selectSlot('ally',0)">?</div>
<div class="slot ally" onclick="selectSlot('ally',1)">?</div>
<div class="slot ally" onclick="selectSlot('ally',2)">?</div>
</div>

</div>

</div>

<!-- PANEL -->
<div id="panel" class="panel">

<button class="closeBtn" onclick="closePanel()">✖</button>

<h3>🔐 Admin Login</h3>
<input id="pass" placeholder="Passwort">
<button onclick="login()">Login</button>

<div id="adminArea" style="display:none;">

<h3>⬆️ Upload</h3>

<input id="name" placeholder="Name">
<input type="file" id="img">

<button onclick="addBrawler()">Hinzufügen</button>

<p class="info">Admin aktiv</p>

</div>

</div>

<script>

/* DOM */
const panel=document.getElementById("panel");
const pass=document.getElementById("pass");
const nameInput=document.getElementById("name");
const imgInput=document.getElementById("img");
const brawlerList=document.getElementById("brawlerList");
const search=document.getElementById("search");
const adminArea=document.getElementById("adminArea");
const adminState=document.getElementById("adminState");
const logoutBtn=document.getElementById("logoutBtn");
const adminTools=document.getElementById("adminTools");

/* ADMIN */
let isAdmin=false;
const PASSWORD="1234";

/* DATA */
let BRAWLERS=JSON.parse(localStorage.getItem("brawlers")||"[]");

/* STATE */
let selectedSlot=null;
let enemy=[null,null,null];
let ally=[null,null,null];

/* PANEL OPEN/CLOSE FIX */
function togglePanel(){
panel.style.display = panel.style.display==="block" ? "none":"block";
}

function closePanel(){
panel.style.display="none";
}

/* CLOSE OUTSIDE CLICK */
window.onclick=function(e){
if(e.target===panel){
panel.style.display="none";
}
};

/* LOGIN */
function login(){
if(pass.value===PASSWORD){
isAdmin=true;

adminArea.style.display="block";
adminTools.style.display="block";

logoutBtn.style.display="inline-block";

adminState.innerText="✅ Admin Online";
}
}

/* LOGOUT */
function logout(){
isAdmin=false;

adminArea.style.display="none";
adminTools.style.display="none";

logoutBtn.style.display="none";

adminState.innerText="❌ Offline";
}

/* ADD */
function addBrawler(){

if(!isAdmin)return;

let nameVal=nameInput.value.trim();
let file=imgInput.files[0];

if(!nameVal||!file)return;

let reader=new FileReader();

reader.onload=function(){

BRAWLERS.push({
name:nameVal,
img:reader.result
});

localStorage.setItem("brawlers",JSON.stringify(BRAWLERS));

nameInput.value="";
imgInput.value="";

renderList();

};

reader.readAsDataURL(file);

}

/* DELETE */
function deleteBrawler(i){
if(!isAdmin)return;

if(confirm("Löschen?")){
BRAWLERS.splice(i,1);
localStorage.setItem("brawlers",JSON.stringify(BRAWLERS));
renderList();
}
}

/* EDIT */
function editBrawler(i){
if(!isAdmin)return;

let newName=prompt("Name:",BRAWLERS[i].name);
if(newName)BRAWLERS[i].name=newName;

let input=document.createElement("input");
input.type="file";

input.onchange=function(){
let file=input.files[0];
if(!file)return;

let reader=new FileReader();

reader.onload=function(){
BRAWLERS[i].img=reader.result;
localStorage.setItem("brawlers",JSON.stringify(BRAWLERS));
renderList();
};

reader.readAsDataURL(file);
};

input.click();
}

/* SLOT */
function selectSlot(team,i){
selectedSlot={team,i};
}

/* PICK */
function pickBrawler(i){

if(!selectedSlot)return;

let b=BRAWLERS[i];

if(selectedSlot.team==="enemy"){
enemy[selectedSlot.i]=b;
}else{
ally[selectedSlot.i]=b;
}

updateUI();

}

/* UI */
function updateUI(){

document.querySelectorAll("#enemyTeam .slot").forEach((s,i)=>{
s.innerHTML=enemy[i]?`<img src="${enemy[i].img}"><br>${enemy[i].name}`:"?";
});

document.querySelectorAll("#allyTeam .slot").forEach((s,i)=>{
s.innerHTML=ally[i]?`<img src="${ally[i].img}"><br>${ally[i].name}`:"?";
});

}

/* RENDER */
function renderList(){

let val=search.value?search.value.toLowerCase():"";

let list=BRAWLERS.filter(b=>{
if(val==="")return true;
return b.name.toLowerCase().includes(val);
});

brawlerList.innerHTML=list.map((b,i)=>`
<div class="brawler" onclick="pickBrawler(${i})">
<img src="${b.img}">
${b.name}

${isAdmin?`
<div class="icon">
<button onclick="deleteBrawler(${i})">🗑️</button>
<button onclick="editBrawler(${i})">✏️</button>
</div>`:""}
</div>
`).join("");

}

renderList();

</script>

</body>
</html>
