<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Brawl Helper Counter System</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 {
    margin-bottom: 10px;
}

.container {
    margin-top: 20px;
}

select, button {
    padding: 10px;
    margin: 10px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
}

button {
    cursor: pointer;
    background: #4dff88;
    color: black;
    font-weight: bold;
}

.card {
    background: #222;
    padding: 15px;
    margin-top: 20px;
    border-radius: 10px;
    display: inline-block;
    min-width: 320px;
    max-width: 90%;
}

.good {
    color: #4dff88;
}

.bad {
    color: #ff4d4d;
}
</style>

</head>

<body>

<h1>🔥 Brawl Counter System</h1>

<div class="container">

    <h3>Wähle deinen Brawler</h3>

    <select id="brawlerSelect"></select>

    <br>

    <button onclick="analyze()">Analyse starten</button>

    <div id="result" class="card">Wähle einen Brawler und starte Analyse</div>

</div>

<script>
// =========================
// 🎮 BRAWLER DATEN (EINFACH ERWEITERBAR)
// =========================

const brawlers = [
    { name: "Shelly", damage: 8, range: 4, hp: 7, speed: 6, role: "Shotgun" },
    { name: "Colt", damage: 9, range: 9, hp: 4, speed: 7, role: "Shooter" },
    { name: "Bull", damage: 9, range: 2, hp: 10, speed: 6, role: "Tank" },
    { name: "Nita", damage: 6, range: 5, hp: 7, speed: 6, role: "Control" },
    { name: "Piper", damage: 10, range: 10, hp: 3, speed: 6, role: "Sniper" }
];

// =========================
// 🔄 DROPDOWN FÜLLEN
// =========================

const select = document.getElementById("brawlerSelect");

brawlers.forEach(b => {
    const option = document.createElement("option");
    option.value = b.name;
    option.innerText = b.name;
    select.appendChild(option);
});

// =========================
// 🧠 COUNTER SYSTEM LOGIK
// =========================

function analyze() {
    const name = select.value;
    const b = brawlers.find(x => x.name === name);

    let strengths = [];
    let weaknesses = [];

    brawlers.forEach(enemy => {
        if (enemy.name === b.name) return;

        let score = 0;

        // Range Vorteil
        if (b.range > enemy.range) score += 2;
        else score -= 2;

        // Damage Vergleich
        if (b.damage > enemy.damage) score += 1;
        else score -= 1;

        // HP Vergleich
        if (b.hp > enemy.hp) score += 1;
        else score -= 1;

        // Speed leicht berücksichtigen
        if (b.speed > enemy.speed) score += 0.5;
        else score -= 0.5;

        if (score >= 2) {
            strengths.push(enemy.name);
        } else if (score <= -2) {
            weaknesses.push(enemy.name);
        }
    });

    document.getElementById("result").innerHTML = `
        <h2>${b.name}</h2>
        <p><b>Rolle:</b> ${b.role}</p>

        <p class="good"><b>Stark gegen:</b> ${strengths.join(", ") || "Keine Daten"}</p>
        <p class="bad"><b>Schwach gegen:</b> ${weaknesses.join(", ") || "Keine Daten"}</p>
    `;
}
</script>

</body>
</html>
