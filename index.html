<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Brawl Ranked Tool V8.7</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

.nav{
background:#111;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:18px;
}

button{
background:#1b1b1b;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

.container{
display:flex;
height:90vh;
}

.left{
width:25%;
background:#111;
padding:10px;
overflow-y:auto;
}

.center{
width:75%;
padding:10px;
}

/* SEARCH */
.search{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

/* BRAWLER */
.brawler{
background:#1b1b1b;
padding:8px;
margin:5px 0;
border-radius:8px;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
}

.brawler img{
width:40px;
height:40px;
border-radius:6px;
}

/* TEAMS */
.team{
display:flex;
justify-content:center;
margin:20px;
}

.slot{
width:120px;
height:120px;
background:#1b1b1b;
margin:10px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
flex-direction:column;
cursor:pointer;
}

.slot img{
width:60px;
height:60px;
}

.enemy{border:2px solid red;}
.ally{border:2px solid green;}

/* PANEL */
.panel{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:12px;
display:none;
width:300px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:none;
}

.info{
font-size:12px;
color:#aaa;
}
</style>
</head>

<body>

<div class="nav">
<div class="title">🏆 Ranked</div>
<button onclick="openSettings()">⚙️</button>
</div>

<div class="container">

<!-- LEFT -->
<div class="left">

<input id="search" class="search" placeholder="Brawler suchen..." oninput="renderList()">

<div id="brawlerList"></div>

</div>

<!-- CENTER -->
<div class="center">

<h2>🔴 Gegner</h2>
<div class="team" id="enemyTeam">
<div class="slot enemy" onclick="selectSlot('enemy',0)">?</div>
<div class="slot enemy" onclick="selectSlot('enemy',1)">?</div>
<div class="slot enemy" onclick="selectSlot('enemy',2)">?</div>
</div>

<h2>🟢 Dein Team</h2>
<div class="team" id="allyTeam">
<div class="slot ally" onclick="selectSlot('ally',0)">?</div>
<div class="slot ally" onclick="selectSlot('ally',1)">?</div>
<div class="slot ally" onclick="selectSlot('ally',2)">?</div>
</div>

<h3>⭐ Empfohlen (hier baust DU dein System)</h3>
<div id="recommend"></div>

</div>

</div>

<!-- SETTINGS -->
<div id="panel" class="panel">

<h3>🔐 Admin Login</h3>
<input id="pass" placeholder="Passwort">
<button onclick="login()">Login</button>

<div id="adminArea" style="display:none;">

<h3>⬆️ Brawler hinzufügen</h3>

<input id="name" placeholder="Name">

<input type="file" id="img">

<button onclick="addBrawler()">Hinzufügen</button>

<p class="info">Nur Admin kann Brawler hinzufügen</p>

</div>

</div>

<script>

/* =========================
   ADMIN SYSTEM
========================= */

let isAdmin=false;
const PASSWORD="1234";

/* =========================
   DATA STORAGE
========================= */

let BRAWLERS=JSON.parse(localStorage.getItem("brawlers")||"[]");

/* =========================
   GAME STATE
========================= */

let selectedSlot=null;
let enemy=[null,null,null];
let ally=[null,null,null];

/* =========================
   SETTINGS PANEL
========================= */

function openSettings(){
panel.style.display="block";
}

function login(){

if(pass.value===PASSWORD){
isAdmin=true;
adminArea.style.display="block";
alert("Admin Login erfolgreich ✅");
}else{
alert("Falsches Passwort ❌");
}

}

/* =========================
   ADD BRAWLER
========================= */

function addBrawler(){

if(!isAdmin){
alert("Kein Zugriff ❌");
return;
}

if(!name.value || !img.files[0]){
alert("Name oder Bild fehlt ❌");
return;
}

let reader=new FileReader();

reader.onload=function(){

let newBrawler={
name:name.value,
img:reader.result
};

BRAWLERS.push(newBrawler);

localStorage.setItem("brawlers",JSON.stringify(BRAWLERS));

alert("Brawler hinzugefügt ✅");

name.value="";
img.value="";

renderList();
};

reader.readAsDataURL(img.files[0]);

}

/* =========================
   SLOT SYSTEM
========================= */

function selectSlot(team,index){
selectedSlot={team,index};
}

/* =========================
   PICK SYSTEM
========================= */

function pickBrawler(index){

if(!selectedSlot){
alert("Bitte zuerst Slot auswählen!");
return;
}

let b=BRAWLERS[index];

if(selectedSlot.team==="enemy"){
enemy[selectedSlot.index]=b;
}else{
ally[selectedSlot.index]=b;
}

updateUI();

}

/* =========================
   UPDATE UI
========================= */

function updateUI(){

let e=document.querySelectorAll("#enemyTeam .slot");
let a=document.querySelectorAll("#allyTeam .slot");

e.forEach((slot,i)=>{
if(enemy[i]){
slot.innerHTML=`<img src="${enemy[i].img}"><br>${enemy[i].name}`;
}else{
slot.innerHTML="?";
}
});

a.forEach((slot,i)=>{
if(ally[i]){
slot.innerHTML=`<img src="${ally[i].img}"><br>${ally[i].name}`;
}else{
slot.innerHTML="?";
}
});

}

/* =========================
   RENDER LIST
========================= */

function renderList(){

let val=search.value.toLowerCase();

brawlerList.innerHTML=BRAWLERS
.map((b,i)=>({b,i}))
.filter(x=>x.b.name.toLowerCase().includes(val))
.map(x=>`
<div class="brawler" onclick="pickBrawler(${x.i})">
<img src="${x.b.img}">
${x.b.name}
</div>
`).join("");

}

/* =========================
   INIT
========================= */

renderList();

</script>

</body>
</html>
