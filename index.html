<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brawl Draft System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

input,select,button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  background:#3b82f6;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#111827;
  padding:15px;
  margin-top:10px;
  border-radius:12px;
}

.admin{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin-top:20px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

<h2>🎮 Brawl Draft System</h2>

<!-- USER INPUT -->
<h3>Enemy Team</h3>
<input id="enemy" placeholder="z.B. Piper, Bull, Mortis">

<button onclick="getRecommendation()">🔥 Get Best Pick</button>

<div id="result" class="card"></div>

<!-- ADMIN LOGIN -->
<button onclick="toggleAdmin()">Admin Panel</button>

<div id="adminPanel" class="admin hidden">

<h3>➕ Add / Edit Brawler</h3>

<input id="bName" placeholder="Brawler Name">
<input id="bRole" placeholder="Role (tank/sniper/etc)">
<input id="bWeak" placeholder="Weak vs (comma)">
<input id="bStrong" placeholder="Strong vs (comma)">

<button onclick="addBrawler()">Save Brawler</button>

</div>

</div>

<script>

/* =========================
   DATABASE (START EMPTY BUT EXTENDABLE)
========================= */

let brawlers = [
  {
    name:"Shelly",
    role:"tank_counter",
    weak:["sniper"],
    strong:["tank"],
    gadgets:["Fast Forward","Clay Pigeons"],
    starpowers:["Shell Shock","Band Aid"],
    hypercharge:"Shock Burst"
  },
  {
    name:"Piper",
    role:"sniper",
    weak:["assassin"],
    strong:["tank"],
    gadgets:["Auto Aimer","Snappy Sniping"],
    starpowers:["Ambush","Snappy Reload"],
    hypercharge:"Long Shot Fury"
  },
  {
    name:"Mortis",
    role:"assassin",
    weak:["burst"],
    strong:["sniper"],
    gadgets:["Coiled Snake","Combo Spinner"],
    starpowers:["Creepy Harvest","Coiled Snake"],
    hypercharge:"Dash Storm"
  }
];

/* =========================
   FIND BRAWLER
========================= */

function find(name){
  return brawlers.find(b =>
    b.name.toLowerCase() === name.toLowerCase()
  );
}

/* =========================
   RECOMMENDATION ENGINE
========================= */

function getRecommendation(){

let enemies = enemy.value.toLowerCase().split(",");

let best = "Spike (default pick)";
let reason = "Balanced allrounder";

for(let e of enemies){
e = e.trim();

for(let b of brawlers){
if(b.weak.includes(e)){
best = b.name;
reason = "Strong counter vs "+e;
}
}
}

result.innerHTML =
"🔥 Best Pick: <b>"+best+"</b><br><br>"+reason;
}

/* =========================
   ADMIN PANEL
========================= */

function toggleAdmin(){
adminPanel.classList.toggle("hidden");
}

function addBrawler(){

let name = bName.value;
let role = bRole.value;
let weak = bWeak.value.split(",");
let strong = bStrong.value.split(",");

brawlers.push({
name,
role,
weak,
strong,
gadgets:[],
starpowers:[],
hypercharge:""
});

alert("Brawler added!");
}

/* =========================
   AUTO LOAD SAMPLE SYSTEM READY FOR 101 BRAWLERS
========================= */

console.log("System ready. Add up to 101 brawlers.");

</script>

</body>
</html>
