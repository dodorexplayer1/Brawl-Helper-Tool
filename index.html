<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Brawl Helper Tool V1.7</title>

<style>
body {
    font-family: Arial;
    background: #0a0a0a;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    color: #4dff88;
    margin-bottom: 5px;
}

.subtitle {
    opacity: 0.7;
    font-size: 13px;
}

select, button {
    padding: 12px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
}

button {
    background: #4dff88;
    font-weight: bold;
    cursor: pointer;
    color: black;
}

.card {
    background: #1a1a1a;
    padding: 25px;
    border-radius: 16px;
    margin-top: 20px;
    display: inline-block;
    min-width: 340px;
    max-width: 95%;
    text-align: left;
    box-shadow: 0 0 15px rgba(77,255,136,0.1);
}

.tag {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
    margin-left: 10px;
}

.op { background: #ff4d4d; }
.strong { background: #4dff88; color: black; }
.normal { background: #ffd24d; color: black; }

.section {
    margin-top: 10px;
}

.good { color: #4dff88; }
.bad { color: #ff4d4d; }
.info { color: #ffd24d; }

.small {
    font-size: 12px;
    opacity: 0.7;
}
</style>

</head>

<body>

<h1>🔥 Brawl Helper Tool V1.7</h1>
<p class="subtitle">UI Upgrade + Better Experience</p>

<select id="brawlerSelect"></select>
<br>
<button onclick="analyze()">Analyse starten</button>

<div id="result" class="card">Wähle einen Brawler</div>

<script>

// =========================
// 🎮 BRAWLER DATA
// =========================

const brawlers = [
    create("Shelly", 8, 4, 7, 6, "Shotgun"),
    create("Colt", 9, 9, 4, 7, "Shooter"),
    create("Bull", 9, 2, 10, 6, "Tank"),
    create("Nita", 6, 5, 7, 6, "Control"),
    create("Piper", 10, 10, 3, 6, "Sniper"),
    create("Leon", 8, 5, 5, 10, "Assassin"),
    create("Spike", 9, 7, 4, 7, "Control")
];

function create(name, dmg, rng, hp, spd, role) {
    return { name, dmg, rng, hp, spd, role };
}

// =========================
// 🔄 DROPDOWN
// =========================

const select = document.getElementById("brawlerSelect");

brawlers.forEach(b => {
    let opt = document.createElement("option");
    opt.value = b.name;
    opt.innerText = b.name;
    select.appendChild(opt);
});

// =========================
// 🧠 ANALYSE ENGINE
// =========================

function analyze() {

    const b = brawlers.find(x => x.name === select.value);

    let strengths = [];
    let weaknesses = [];
    let scoreTotal = 0;

    for (let e of brawlers) {

        if (e.name === b.name) continue;

        let score =
            (b.rng - e.rng) * 2 +
            (b.dmg - e.dmg) * 1.2 +
            (b.hp - e.hp) * 1.1 +
            (b.spd - e.spd) * 0.5;

        if (b.role === "Tank" && e.role === "Sniper") score += 2;
        if (b.role === "Sniper" && e.role === "Tank") score -= 2;
        if (b.role === "Assassin" && e.role === "Shooter") score += 1;

        scoreTotal += score;

        if (score >= 2) strengths.push(`${e.name} (+${score.toFixed(1)})`);
        if (score <= -2) weaknesses.push(`${e.name} (${score.toFixed(1)})`);
    }

    let tag = "normal";
    let label = "Normal";

    if (scoreTotal > 10) {
        tag = "op";
        label = "🔥 OP META";
    }
    else if (scoreTotal > 5) {
        tag = "strong";
        label = "🟢 Strong";
    }
    else if (scoreTotal < -5) {
        tag = "normal";
        label = "🔴 Weak";
    }

    document.getElementById("result").innerHTML = `
        <h2>${b.name}
            <span class="tag ${tag}">${label}</span>
        </h2>

        <div class="section">
            <b>Rolle:</b> ${b.role}
        </div>

        <div class="section good">
            <b>Stark gegen:</b><br>
            ${strengths.join("<br>") || "Keine Daten"}
        </div>

        <div class="section bad">
            <b>Schwach gegen:</b><br>
            ${weaknesses.join("<br>") || "Keine Daten"}
        </div>

        <hr>

        <div class="section info">
            <b>Score:</b> ${scoreTotal.toFixed(1)}
        </div>
    `;
}

</script>

</body>
</html>
