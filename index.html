<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Brawl Helper Tool V4.8</title>

<style>
body {
    font-family: Arial;
    background: #0a0a0a;
    color: white;
    margin: 0;
}

h1 { color: #4dff88; }

nav {
    display: flex;
    justify-content: center;
    background: #111;
    padding: 10px;
}

nav button {
    margin: 5px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #1b1b1b;
    color: white;
    cursor: pointer;
}

nav button:hover {
    background: #4dff88;
    color: black;
}

.section {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 10px;
}

.card {
    background: #1b1b1b;
    padding: 15px;
    border-radius: 12px;
    cursor: pointer;
}

.detail {
    background: #151515;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
}

.good { color: #4dff88; }
.info { color: #ffd24d; }

.small {
    font-size: 12px;
    opacity: 0.7;
}
</style>

</head>

<body>

<h1 style="text-align:center;">🔥 Brawl Helper Tool V4.8</h1>

<nav>
    <button onclick="showTab('home')">🏠 Home</button>
    <button onclick="showTab('list')">📋 Brawler</button>
    <button onclick="showTab('stats')">📊 Stats</button>
</nav>

<!-- HOME -->
<div id="home" class="section active">
    <h2>Dashboard</h2>
    <p class="info">Willkommen in deiner Meta Plattform</p>
</div>

<!-- LIST -->
<div id="list" class="section">

    <h2>📋 Brawler Liste</h2>

    <div id="brawlers" class="grid"></div>

</div>

<!-- STATS -->
<div id="stats" class="section">

    <h2>📊 Detail</h2>

    <div id="detail" class="detail">
        Klicke auf einen Brawler
    </div>

</div>

<script>

//
// =========================
// 📦 DATA
//

const BRAWLERS = [
    create("Shelly", "Shotgun", 7),
    create("Colt", "Shooter", 8),
    create("Bull", "Tank", 9),
    create("Nita", "Control", 7),
    create("Piper", "Sniper", 9),
    create("Leon", "Assassin", 8),
    create("Spike", "Control", 9)
];

function create(name, role, power) {
    return {
        name,
        role,
        stats: {
            dmg: power + 1,
            rng: power,
            hp: 10 - power,
            spd: power
        }
    };
}

function meta(b) {
    return (
        b.stats.dmg * 0.35 +
        b.stats.rng * 0.25 +
        b.stats.hp * 0.25 +
        b.stats.spd * 0.15
    );
}

//
// =========================
// 🧭 NAVIGATION
//

function showTab(id) {

    document.querySelectorAll(".section")
        .forEach(s => s.classList.remove("active"));

    document.getElementById(id).classList.add("active");

}

//
// =========================
// 📋 LIST
//

function render() {

    const container = document.getElementById("brawlers");

    container.innerHTML = "";

    BRAWLERS
        .sort((a, b) => meta(b) - meta(a))
        .forEach(b => {

            let div = document.createElement("div");
            div.className = "card";

            div.onclick = () => showDetail(b);

            div.innerHTML = `
                <h3>${b.name}</h3>
                <p class="info">${b.role}</p>
                <p>Meta: ${meta(b).toFixed(1)}</p>
            `;

            container.appendChild(div);
        });
}

//
// =========================
// 📊 DETAIL
//

function showDetail(b) {

    showTab("stats");

    document.getElementById("detail").innerHTML = `
        <h2>${b.name}</h2>

        <p class="info">${b.role}</p>

        <hr>

        <p>💥 DMG: ${b.stats.dmg}</p>
        <p>🎯 RNG: ${b.stats.rng}</p>
        <p>❤️ HP: ${b.stats.hp}</p>
        <p>⚡ SPD: ${b.stats.spd}</p>

        <hr>

        <p class="good">Meta Score: ${meta(b).toFixed(1)}</p>

        <p class="small">V4.8 Dashboard System</p>
    `;
}

//
// INIT
//

render();

</script>

</body>
</html>
