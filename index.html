<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Brawl Ranked Tool</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* NAV */
.nav{
background:#111;
padding:10px;
text-align:center;
}

.nav button{
background:#1b1b1b;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

/* LAYOUT */
.container{
display:flex;
height:90vh;
}

/* LEFT PANEL */
.left{
width:25%;
background:#111;
padding:10px;
overflow-y:auto;
}

.search{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

/* CENTER */
.center{
width:75%;
padding:10px;
}

/* TEAMS */
.team{
display:flex;
justify-content:center;
margin:20px;
}

.slot{
width:120px;
height:120px;
background:#1b1b1b;
margin:10px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
cursor:pointer;
}

.enemy{border:2px solid red;}
.ally{border:2px solid green;}

/* BRAWLER LIST */
.brawler{
background:#1b1b1b;
padding:8px;
margin:5px 0;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="nav">
<button onclick="goRanked()">🏆 Ranked</button>
</div>

<div id="ranked" class="container">

<!-- LEFT -->
<div class="left">

<input id="search" class="search" placeholder="Brawler suchen..." oninput="renderList()">

<div id="brawlerList"></div>

</div>

<!-- CENTER -->
<div class="center">

<h2>🔴 Gegner</h2>
<div class="team" id="enemyTeam">
<div class="slot enemy" onclick="selectSlot('enemy',0)">?</div>
<div class="slot enemy" onclick="selectSlot('enemy',1)">?</div>
<div class="slot enemy" onclick="selectSlot('enemy',2)">?</div>
</div>

<h2>🟢 Dein Team</h2>
<div class="team" id="allyTeam">
<div class="slot ally" onclick="selectSlot('ally',0)">?</div>
<div class="slot ally" onclick="selectSlot('ally',1)">?</div>
<div class="slot ally" onclick="selectSlot('ally',2)">?</div>
</div>

<h3>⭐ Empfohlene Brawler (hier baust DU dein System)</h3>
<div id="recommend"></div>

</div>

</div>

<script>

/* =========================
   BRAWLER LIST (1–10)
========================= */
const BRAWLERS=[
"Shelly","Nita","Colt","Bull","Brock",
"El Primo","Barley","Poco","Rosa","Jessie"
];

/* =========================
   STATE
========================= */
let selectedSlot=null;
let enemy=[null,null,null];
let ally=[null,null,null];

/* =========================
   NAV
========================= */
function goRanked(){
document.getElementById("ranked").style.display="flex";
}

/* =========================
   SELECT SLOT
========================= */
function selectSlot(team,index){
selectedSlot={team,index};
}

/* =========================
   PICK BRAWLER
========================= */
function pickBrawler(name){

if(!selectedSlot)return;

if(selectedSlot.team==="enemy"){
enemy[selectedSlot.index]=name;
}else{
ally[selectedSlot.index]=name;
}

updateUI();
}

/* =========================
   UPDATE UI
========================= */
function updateUI(){

let enemySlots=document.querySelectorAll("#enemyTeam .slot");
let allySlots=document.querySelectorAll("#allyTeam .slot");

enemySlots.forEach((s,i)=>{
s.innerHTML=enemy[i]||"?";
});

allySlots.forEach((s,i)=>{
s.innerHTML=ally[i]||"?";
});

}

/* =========================
   RENDER LIST
========================= */
function renderList(){

let val=search.value.toLowerCase();

brawlerList.innerHTML=BRAWLERS
.filter(b=>b.toLowerCase().includes(val))
.map(b=>`
<div class="brawler" onclick="pickBrawler('${b}')">
${b}
</div>
`).join("");

}

/* INIT */
renderList();

</script>

</body>
</html>
