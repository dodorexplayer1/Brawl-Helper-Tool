<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Brawl Helper Tool V3.9</title>

<style>
body {
    font-family: Arial;
    background: #0a0a0a;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 { color: #4dff88; }

select, button {
    padding: 10px;
    margin: 6px;
    border-radius: 8px;
    border: none;
}

button {
    background: #4dff88;
    font-weight: bold;
    cursor: pointer;
    color: black;
}

.card {
    background: #1b1b1b;
    padding: 20px;
    border-radius: 14px;
    margin-top: 20px;
    display: inline-block;
    min-width: 360px;
    max-width: 95%;
    text-align: left;
}

.history { margin-top: 20px; }

.good { color: #4dff88; }
.bad { color: #ff4d4d; }
.info { color: #ffd24d; }

.small {
    font-size: 12px;
    opacity: 0.7;
}
</style>

</head>

<body>

<h1>🔥 Brawl Helper Tool V3.9</h1>
<p class="small">Pre-Release Version</p>

<div id="team"></div>

<button onclick="saveTeam()">💾 Speichern</button>
<button onclick="analyze()">Analyse</button>
<button onclick="resetTeam()">Reset</button>

<div id="result" class="card">Wähle dein Team</div>

<div class="card history">
    <h3>🧠 Letzte Teams</h3>
    <div id="history"></div>
</div>

<script>

//
// =========================
// 📦 DATA (weniger random → stabiler)
// =========================
//

const BRAWLERS = [
    create("Shelly", "Shotgun", 7),
    create("Colt", "Shooter", 8),
    create("Bull", "Tank", 9),
    create("Nita", "Control", 7),
    create("Piper", "Sniper", 9),
    create("Leon", "Assassin", 8),
    create("Spike", "Control", 8)
];

function create(name, role, power) {
    return {
        name,
        role,
        power
    };
}

//
// =========================
// 🧩 UI
// =========================
//

const teamDiv = document.getElementById("team");
let selects = [];

for (let i = 0; i < 3; i++) {

    let sel = document.createElement("select");

    BRAWLERS.forEach(b => {
        let opt = document.createElement("option");
        opt.value = b.name;
        opt.innerText = b.name;
        sel.appendChild(opt);
    });

    selects.push(sel);
    teamDiv.appendChild(sel);
}

//
// =========================
// 💾 HISTORY
// =========================
//

function loadHistory() {

    let history = JSON.parse(localStorage.getItem("history") || "[]");

    const div = document.getElementById("history");
    div.innerHTML = "";

    history.forEach(team => {

        let btn = document.createElement("button");
        btn.innerText = team.join(", ");

        btn.onclick = () => {
            team.forEach((name, i) => selects[i].value = name);
        };

        div.appendChild(btn);
    });
}

function saveTeam() {

    let team = selects.map(s => s.value);

    let history = JSON.parse(localStorage.getItem("history") || "[]");

    history.unshift(team);
    history = history.slice(0, 5);

    localStorage.setItem("history", JSON.stringify(history));

    loadHistory();
}

function resetTeam() {
    selects.forEach(s => s.selectedIndex = 0);
}

//
// =========================
// 🧠 ANALYSE V3.9
// =========================
//

function analyze() {

    let team = selects.map(s =>
        BRAWLERS.find(b => b.name === s.value)
    );

    let roles = {};
    let baseScore = 0;

    for (let b of team) {
        roles[b.role] = (roles[b.role] || 0) + 1;
        baseScore += b.power;
    }

    // =========================
    // 🤝 SYNERGY SYSTEM
    // =========================

    let synergy = 0;

    if (roles["Tank"] && roles["Control"]) synergy += 5;
    if (roles["Assassin"]) synergy += 3;
    if (roles["Sniper"] && roles["Tank"]) synergy += 2;

    // =========================
    // ⚠️ PROBLEME
    // =========================

    let issues = [];

    if (!roles["Tank"]) issues.push("Kein Tank");
    if (!roles["Sniper"]) issues.push("Kein Sniper");
    if (roles["Sniper"] && !roles["Tank"]) issues.push("Sniper ohne Schutz");

    // =========================
    // 🤖 BEST ROLE RECOMMENDATION
    // =========================

    let recommend = "Balanced";

    if (!roles["Tank"]) recommend = "👉 Tank hinzufügen";
    else if (!roles["Sniper"]) recommend = "👉 Sniper hinzufügen";
    else if (!roles["Control"]) recommend = "👉 Control fehlt";
    else if (!roles["Assassin"]) recommend = "👉 Assassin optional";

    let total = baseScore + synergy;

    let rating = "Normal";

    if (total > 25) rating = "🔥 OP TEAM";
    else if (total > 18) rating = "🟢 Strong Team";
    else if (total < 12) rating = "🔴 Weak Team";

    document.getElementById("result").innerHTML = `
        <h2>Team Analyse</h2>

        <p class="info"><b>Rating:</b> ${rating}</p>

        <hr>

        <p class="good"><b>Base Power:</b> ${baseScore}</p>
        <p class="info"><b>Synergy:</b> +${synergy}</p>
        <p class="info"><b>Total:</b> ${total}</p>

        <hr>

        <p class="bad"><b>Probleme:</b><br>
        ${issues.length ? issues.join("<br>") : "Keine"}
        </p>

        <hr>

        <p class="info"><b>Empfehlung:</b><br>${recommend}</p>

        <hr>

        <p class="small">V3.9 Pre-Release System</p>
    `;
}

loadHistory();

</script>

</body>
</html>
