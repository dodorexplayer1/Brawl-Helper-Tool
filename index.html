//
// =========================
// ⚙️ META ENGINE
// =========================
//

function meta(b){
    return (b.hp/1000) + (b.role==="Tank"?2:0) + (b.gears.includes("Schaden")?1:0);
}

function tier(m){
    if(m>=12)return"S";
    if(m>=10)return"A";
    if(m>=8)return"B";
    return"C";
}

//
// =========================
// 🖥️ RENDER
// =========================
//

function render(){

const list=document.getElementById("list");
list.innerHTML="";

BRAWLERS
.sort((a,b)=>meta(b)-meta(a))
.forEach(b=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h3>${b.name}</h3>
<p class="info">${b.role}</p>
<p>HP: ${b.hp}</p>
<p>Tier: ${tier(meta(b))}</p>
`;

div.onclick=()=>show(b);

list.appendChild(div);

});

}

//
// =========================
// 📊 DETAIL
// =========================
//

function show(b){

document.getElementById("detail").innerHTML=`
<h2>${b.name}</h2>
<p>${b.role}</p>
<hr>
<p>HP: ${b.hp}</p>
<p>Super: ${b.super}</p>
<p class="good">Meta: ${meta(b)}</p>
<p>Tier: ${tier(meta(b))}</p>
`;

}

render();
