<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Brawl Helper Tool V3</title>

<style>
body {
    font-family: Arial;
    background: #0a0a0a;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 { color: #4dff88; }

select, button {
    padding: 10px;
    margin: 6px;
    border-radius: 8px;
    border: none;
}

button {
    background: #4dff88;
    font-weight: bold;
    cursor: pointer;
    color: black;
}

.card {
    background: #1b1b1b;
    padding: 20px;
    border-radius: 14px;
    margin-top: 20px;
    display: inline-block;
    min-width: 360px;
    max-width: 95%;
    text-align: left;
}

.good { color: #4dff88; }
.bad { color: #ff4d4d; }
.info { color: #ffd24d; }

.small {
    font-size: 12px;
    opacity: 0.7;
}
</style>

</head>

<body>

<h1>🔥 Brawl Helper Tool V3</h1>
<p class="small">Full Loadout + Data Architecture</p>

<div id="app"></div>

<div id="result" class="card">Wähle einen Brawler</div>

<script>

//
// =========================
// 📦 BRAWLER DATABASE V3
// =========================
// 👉 101+ ready Struktur
//

const BRAWLERS = [
    create("Shelly", 8, 4, 7, 6, "Shotgun"),
    create("Colt", 9, 9, 4, 7, "Shooter"),
    create("Bull", 9, 2, 10, 6, "Tank"),
    create("Nita", 6, 5, 7, 6, "Control"),
    create("Piper", 10, 10, 3, 6, "Sniper"),
    create("Leon", 8, 5, 5, 10, "Assassin"),
    create("Spike", 9, 7, 4, 7, "Control")
];

function create(name, dmg, rng, hp, spd, role) {
    return {
        name,
        stats: { dmg, rng, hp, spd },
        role,

        // 🎮 V3 LOADOUT SYSTEM (pro Brawler individuell)
        loadout: {
            starPower: "None",
            gadget: "None",
            hypercharge: false
        }
    };
}

//
// =========================
// 🧠 UI GENERATION (V3 STYLE)
// =========================
//

const app = document.getElementById("app");

BRAWLERS.forEach((b, index) => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <h3>${b.name}</h3>

        <p class="info">Rolle: ${b.role}</p>

        <select id="sp-${index}">
            <option>None</option>
            <option>Star Power A</option>
            <option>Star Power B</option>
        </select>

        <select id="g-${index}">
            <option>None</option>
            <option>Gadget A</option>
            <option>Gadget B</option>
        </select>

        <button onclick="analyze(${index})">Analyse</button>
    `;

    app.appendChild(div);
});

//
// =========================
// 🧠 ENGINE V3
// =========================
//

function analyze(i) {

    const b = BRAWLERS[i];

    const sp = document.getElementById(`sp-${i}`).value;
    const gadget = document.getElementById(`g-${i}`).value;

    let strengths = [];
    let weaknesses = [];

    let total = 0;

    for (let e of BRAWLERS) {

        if (e.name === b.name) continue;

        let score =
            (b.stats.rng - e.stats.rng) * 2 +
            (b.stats.dmg - e.stats.dmg) * 1.2 +
            (b.stats.hp - e.stats.hp) * 1.1 +
            (b.stats.spd - e.stats.spd) * 0.5;

        // ROLE MATCHUPS
        if (b.role === "Tank" && e.role === "Sniper") score += 2;
        if (b.role === "Sniper" && e.role === "Tank") score -= 2;
        if (b.role === "Assassin" && e.role === "Shooter") score += 1;

        // LOADOUT EFFECT
        if (sp === "Star Power A") score += 0.5;
        if (sp === "Star Power B") score += 1;

        if (gadget === "Gadget A") score += 0.3;
        if (gadget === "Gadget B") score += 0.7;

        total += score;

        if (score >= 2) strengths.push(`${e.name} (+${score.toFixed(1)})`);
        if (score <= -2) weaknesses.push(`${e.name} (${score.toFixed(1)})`);
    }

    let rating = "Normal";

    if (total > 10) rating = "🔥 OP META";
    else if (total > 5) rating = "🟢 Strong";
    else if (total < -5) rating = "🔴 Weak";

    document.getElementById("result").innerHTML = `
        <h2>${b.name}</h2>

        <p><b>Rolle:</b> ${b.role}</p>

        <p class="info"><b>Meta:</b> ${rating}</p>

        <p class="info"><b>Loadout:</b> ${sp} | ${gadget}</p>

        <hr>

        <p class="good"><b>Stark gegen:</b><br>${strengths.join("<br>") || "Keine Daten"}</p>

        <p class="bad"><b>Schwach gegen:</b><br>${weaknesses.join("<br>") || "Keine Daten"}</p>

        <hr>

        <p class="small">V3 System Active</p>
    `;
}

</script>

</body>
</html>
