<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>BrawlRankedHelper</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f0f1a;
  color: white;
}

#navbar {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#1c1c2e;
  position:sticky;
  top:0;
}

.page { display:none; padding:20px; }
.active { display:block; }

#rankedContainer {
  display:flex;
  gap:20px;
}

#enemyTeam, #yourTeam {
  flex:1;
  background:#1a1a2a;
  padding:10px;
}

#searchPanel {
  width:250px;
  background:#222;
  padding:10px;
}

.brawler {
  background:#333;
  margin:5px 0;
  padding:5px;
  cursor:pointer;
}

#modal {
  display:none;
  position:fixed;
  top:20%;
  left:35%;
  width:30%;
  background:#222;
  padding:20px;
}
</style>

</head>

<body>

<!-- NAV -->
<div id="navbar">
  <div>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('ranked')">Ranked</button>
  </div>

  <div>
    <span id="userStatus">Nicht eingeloggt</span>
    <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page active">

<h2>Register</h2>
<input id="regUser" placeholder="Username"><br>
<input id="regEmail" placeholder="Email"><br>
<input id="regPass" type="password" placeholder="Passwort"><br>
<button onclick="register()">Registrieren</button>

<hr>

<h2>Login</h2>
<input id="logEmail" placeholder="Email"><br>
<input id="logPass" type="password" placeholder="Passwort"><br>
<button onclick="login()">Login</button>

</div>

<!-- RANKED -->
<div id="ranked" class="page">

<h2>Ranked</h2>

<div id="rankedContainer">

<div id="searchPanel">
<h4>Brawler</h4>
<div id="brawlerList"></div>
<button id="adminBtn" onclick="openModal()" style="display:none;">Upload</button>
</div>

<div id="enemyTeam">
<h3>Enemy</h3>
</div>

<div id="yourTeam">
<h3>You</h3>
</div>

</div>

</div>

<!-- MODAL -->
<div id="modal">
<h3>Upload Brawler</h3>
<input id="bName" placeholder="Name"><br>
<input id="bImg" placeholder="Image URL"><br>
<button onclick="uploadBrawler()">Save</button>
<button onclick="closeModal()">X</button>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged,
sendEmailVerification
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 FIREBASE CONFIG (MUSS EINGETRAGEN WERDEN)
const firebaseConfig = {
apiKey: "XXX",
authDomain: "XXX",
projectId: "brawlrankedhelper",
storageBucket: "XXX",
messagingSenderId: "XXX",
appId: "XXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

---

# 🔐 REGISTER (FIX + EMAIL VERIFICATION)

window.register = async function(){

let username = regUser.value;
let email = regEmail.value;
let pass = regPass.value;

try {

const userCred = await createUserWithEmailAndPassword(auth,email,pass);

// 📩 EMAIL BESTÄTIGUNG SENDEN
await sendEmailVerification(userCred.user);

// USER SPEICHERN
await setDoc(doc(db,"users",userCred.user.uid),{
username: username,
email: email,
isAdmin: false,
verified: false
});

alert("Check deine Email zur Bestätigung 📩");

} catch(e){
alert(e.message);
}

};

---

# 🔑 LOGIN (BLOCK WENN NICHT VERIFIZIERT)

window.login = async function(){

let email = logEmail.value;
let pass = logPass.value;

try {

const userCred = await signInWithEmailAndPassword(auth,email,pass);

if(!userCred.user.emailVerified){
alert("Bitte Email bestätigen 📩");
return;
}

const snap = await getDoc(doc(db,"users",userCred.user.uid));
currentUser = snap.data();

updateUI();
loadBrawlers();

} catch(e){
alert(e.message);
}

};

---

# 🚪 LOGOUT

window.logout = async function(){
await signOut(auth);
currentUser = null;
updateUI();
};

---

# 🔁 AUTH STATE

onAuthStateChanged(auth, async (user)=>{

if(user && user.emailVerified){
const snap = await getDoc(doc(db,"users",user.uid));
currentUser = snap.data();
updateUI();
loadBrawlers();
}

});

---

# 🧠 UI UPDATE

function updateUI(){

if(currentUser){
userStatus.innerText = "Logged: " + currentUser.username;
logoutBtn.style.display = "block";

if(currentUser.isAdmin){
adminBtn.style.display = "block";
}

}else{
userStatus.innerText = "Nicht eingeloggt";
logoutBtn.style.display = "none";
adminBtn.style.display = "none";
}

}

---

# 🎮 BRAWLERS

window.openModal = function(){
modal.style.display = "block";
}

window.closeModal = function(){
modal.style.display = "none";
}

window.uploadBrawler = async function(){

if(!currentUser?.isAdmin) return;

await addDoc(collection(db,"brawlers"),{
name: bName.value,
img: bImg.value
});

closeModal();
loadBrawlers();

}

window.loadBrawlers = async function(){

let list = document.getElementById("brawlerList");
list.innerHTML = "";

let snap = await getDocs(collection(db,"brawlers"));

snap.forEach(d=>{
let b = d.data();

let div = document.createElement("div");
div.className="brawler";
div.innerText = b.name;

list.appendChild(div);
});

}

---

# 🌐 NAV

window.showPage = function(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
};

</script>

</body>
</html>
