<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Brawl Helper Tool V4</title>

<style>
body {
    font-family: Arial;
    background: #0a0a0a;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 { color: #4dff88; }

select, button {
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: none;
}

button {
    background: #4dff88;
    font-weight: bold;
    cursor: pointer;
}

.card {
    background: #1b1b1b;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
    display: inline-block;
    min-width: 340px;
    max-width: 95%;
    text-align: left;
}

.good { color: #4dff88; }
.bad { color: #ff4d4d; }
.info { color: #ffd24d; }
.small { font-size: 12px; opacity: 0.7; }
</style>

</head>

<body>

<h1>🔥 Brawl Helper Tool V4</h1>
<p class="small">Meta System + Smart Counter Engine</p>

<select id="brawlerSelect"></select>
<br>
<button onclick="analyze()">Analyse starten</button>

<div id="result" class="card">Wähle einen Brawler</div>

<script>

// =========================
// 🎮 V4 BRAWLER SYSTEM
// =========================

const brawlers = [
    { name: "Shelly", dmg: 8, rng: 4, hp: 7, spd: 6, role: "Shotgun" },
    { name: "Colt", dmg: 9, rng: 9, hp: 4, spd: 7, role: "Shooter" },
    { name: "Bull", dmg: 9, rng: 2, hp: 10, spd: 6, role: "Tank" },
    { name: "Nita", dmg: 6, rng: 5, hp: 7, spd: 6, role: "Control" },
    { name: "Piper", dmg: 10, rng: 10, hp: 3, spd: 6, role: "Sniper" },
    { name: "Leon", dmg: 8, rng: 5, hp: 5, spd: 10, role: "Assassin" },
    { name: "Spike", dmg: 9, rng: 7, hp: 4, spd: 7, role: "Control" }
];

// =========================
// 🔄 DROPDOWN
// =========================

const select = document.getElementById("brawlerSelect");

brawlers.forEach(b => {
    let o = document.createElement("option");
    o.value = b.name;
    o.innerText = b.name;
    select.appendChild(o);
});

// =========================
// 🧠 V4 META ENGINE
// =========================

function analyze() {

    const name = select.value;
    const b = brawlers.find(x => x.name === name);

    let strengths = [];
    let weaknesses = [];

    let totalScore = 0;

    brawlers.forEach(enemy => {

        if (enemy.name === b.name) return;

        let score = 0;

        // 📊 BASIC STATS WEIGHTED
        score += (b.rng - enemy.rng) * 2;
        score += (b.dmg - enemy.dmg) * 1.2;
        score += (b.hp - enemy.hp) * 1.1;
        score += (b.spd - enemy.spd) * 0.5;

        // 🧠 ROLE META SYSTEM
        const meta = {
            "Tank": { "Sniper": 2 },
            "Sniper": { "Tank": -2 },
            "Assassin": { "Shooter": 1.5 },
            "Shooter": { "Assassin": -1 }
        };

        if (meta[b.role] && meta[b.role][enemy.role]) {
            score += meta[b.role][enemy.role];
        }

        // 📈 COLLECT TOTAL META SCORE
        totalScore += score;

        if (score >= 2) {
            strengths.push(`${enemy.name} <span class="info">(+${score.toFixed(1)})</span>`);
        } 
        else if (score <= -2) {
            weaknesses.push(`${enemy.name} <span class="info">(${score.toFixed(1)})</span>`);
        }
    });

    // =========================
    // 🏆 META RATING
    // =========================

    let rating = "Normal";

    if (totalScore > 10) rating = "🔥 OP Meta";
    else if (totalScore > 5) rating = "🟢 Strong";
    else if (totalScore < -5) rating = "🔴 Weak";

    document.getElementById("result").innerHTML = `
        <h2>${b.name}</h2>

        <p><b>Rolle:</b> ${b.role}</p>

        <p class="info"><b>Meta Rating:</b> ${rating}</p>

        <p class="good"><b>Stark gegen:</b><br>${strengths.join("<br>") || "Keine Daten"}</p>

        <p class="bad"><b>Schwach gegen:</b><br>${weaknesses.join("<br>") || "Keine Daten"}</p>

        <hr>

        <p class="small">Total Meta Score: ${totalScore.toFixed(1)}</p>
    `;
}

</script>

</body>
</html>
