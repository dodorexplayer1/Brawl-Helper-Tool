<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>BrawlRankedHelper</title>
<style>

body {
  font-family: Arial;
  margin: 0;
  background: #0f0f1a;
  color: white;
}

/* NAVBAR */
#navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #1c1c2e;
  position: sticky;
  top: 0;
}

.nav-left button {
  margin-right: 10px;
}

/* LAYOUT */
.page {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

/* RANKED UI */
#rankedContainer {
  display: flex;
  gap: 20px;
}

#enemyTeam, #yourTeam {
  flex: 1;
  padding: 10px;
  background: #1a1a2a;
}

#searchPanel {
  width: 250px;
  background: #222;
  padding: 10px;
}

/* BRAWLER GRID */
.brawler {
  padding: 5px;
  background: #333;
  margin: 5px 0;
  cursor: pointer;
}

/* ADMIN */
.adminBtn {
  background: red;
  color: white;
  padding: 5px;
  cursor: pointer;
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  top: 20%;
  left: 35%;
  width: 30%;
  background: #222;
  padding: 20px;
  z-index: 1000;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div id="navbar">

  <div class="nav-left">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('ranked')">Ranked</button>
  </div>

  <div class="nav-right">
    <span id="userStatus">Nicht eingeloggt</span>
    <button onclick="logout()" id="logoutBtn" style="display:none;">Logout</button>
  </div>

</div>

<!-- HOME PAGE -->
<div id="home" class="page active">

<h2>Login / Register</h2>

<div>
  <h3>Register</h3>
  <input id="regUser" placeholder="Username"><br>
  <input id="regEmail" placeholder="Email"><br>
  <input id="regPass" type="password" placeholder="Passwort"><br>
  <button onclick="register()">Registrieren</button>
</div>

<hr>

<div>
  <h3>Login</h3>
  <input id="logEmail" placeholder="Email"><br>
  <input id="logPass" type="password" placeholder="Passwort"><br>
  <button onclick="login()">Login</button>
</div>

</div>

<!-- RANKED PAGE -->
<div id="ranked" class="page">

<h2>Ranked Mode</h2>

<div id="rankedContainer">

  <!-- SEARCH / BRAWLERS -->
  <div id="searchPanel">
    <h4>Brawler Suche</h4>
    <input placeholder="Search..." id="searchInput">
    <div id="brawlerList"></div>

    <button onclick="openUpload()" id="adminUploadBtn" style="display:none;">
      Upload Brawler
    </button>
  </div>

  <!-- ENEMY TEAM -->
  <div id="enemyTeam">
    <h3>Enemy Team</h3>
    <div id="enemySlots">3 Slots</div>
  </div>

  <!-- YOUR TEAM -->
  <div id="yourTeam">
    <h3>Your Team</h3>
    <div id="yourSlots">3 Slots</div>
  </div>

</div>

</div>

<!-- UPLOAD MODAL -->
<div id="modal">
  <h3>Brawler Upload</h3>
  <input id="brawlerName" placeholder="Name"><br>
  <input id="brawlerImg" placeholder="Image URL"><br>
  <button onclick="uploadBrawler()">Upload</button>
  <button onclick="closeModal()">X</button>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// FIREBASE CONFIG
const firebaseConfig = {
apiKey: "XXX",
authDomain: "XXX",
projectId: "brawlrankedhelper",
storageBucket: "XXX",
messagingSenderId: "XXX",
appId: "XXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* ================= NAV ================= */

window.showPage = function(page){
document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

/* ================= REGISTER ================= */

window.register = async function(){
let username = regUser.value;
let email = regEmail.value;
let pass = regPass.value;

let userCred = await createUserWithEmailAndPassword(auth,email,pass);

await setDoc(doc(db,"users",userCred.user.uid),{
username: username,
email: email,
isAdmin: false
});

}

/* ================= LOGIN ================= */

window.login = async function(){
let email = logEmail.value;
let pass = logPass.value;

let userCred = await signInWithEmailAndPassword(auth,email,pass);

let snap = await getDoc(doc(db,"users",userCred.user.uid));
currentUser = snap.data();

updateUI();
loadBrawlers();
}

/* ================= LOGOUT ================= */

window.logout = async function(){
await signOut(auth);
currentUser = null;
updateUI();
}

/* ================= AUTH STATE ================= */

onAuthStateChanged(auth, async (user)=>{
if(user){
let snap = await getDoc(doc(db,"users",user.uid));
currentUser = snap.data();
updateUI();
loadBrawlers();
}
});

/* ================= UI ================= */

function updateUI(){

if(currentUser){
userStatus.innerText = "Logged in: " + currentUser.username;
logoutBtn.style.display = "block";

if(currentUser.isAdmin){
adminUploadBtn.style.display = "block";
}
}else{
userStatus.innerText = "Nicht eingeloggt";
logoutBtn.style.display = "none";
adminUploadBtn.style.display = "none";
}

}

/* ================= BRAWLERS ================= */

window.openUpload = function(){
modal.style.display = "block";
}

window.closeModal = function(){
modal.style.display = "none";
}

window.uploadBrawler = async function(){

if(!currentUser?.isAdmin) return;

await addDoc(collection(db,"brawlers"),{
name: brawlerName.value,
img: brawlerImg.value
});

closeModal();
loadBrawlers();
}

window.loadBrawlers = async function(){

let list = document.getElementById("brawlerList");
list.innerHTML = "";

let snap = await getDocs(collection(db,"brawlers"));

snap.forEach(doc=>{
let b = doc.data();

let div = document.createElement("div");
div.className = "brawler";
div.innerHTML = b.name;

list.appendChild(div);
});

}

</script>

</body>
</html>
