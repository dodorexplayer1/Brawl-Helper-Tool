<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Brawl Helper Tool V5.1</title>

<style>
body {
    font-family: Arial;
    background: #0a0a0a;
    color: white;
    margin: 0;
}

h1 { text-align:center; color:#4dff88; }

.controls {
    text-align:center;
    padding: 10px;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin: 5px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
    padding: 20px;
}

.card {
    background: #1b1b1b;
    padding: 15px;
    border-radius: 12px;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.03);
}

.panel {
    padding: 20px;
    margin: 20px;
    background: #151515;
    border-radius: 12px;
}

.good { color:#4dff88; }
.info { color:#ffd24d; }
</style>

</head>

<body>

<h1>🔥 Brawl Helper Tool V5.1</h1>

<div class="controls">
    <input id="search" placeholder="🔍 Brawler suchen..." oninput="render()">

    <select id="roleFilter" onchange="render()">
        <option value="ALL">Alle Rollen</option>
        <option value="Tank">Tank</option>
        <option value="Shooter">Shooter</option>
        <option value="Control">Control</option>
        <option value="Assassin">Assassin</option>
        <option value="Support">Support</option>
        <option value="Thrower">Thrower</option>
        <option value="Damage">Damage</option>
    </select>
</div>

<div class="panel" id="detail">Klicke auf einen Brawler</div>

<div class="container" id="list"></div>

<script>

//
// =========================
// 📦 DATA ENGINE (V5 CLEAN)
// =========================
//

const BRAWLERS = [

{ name:"Shelly", hp:7400, role:"Shooter", gears:["Schaden","Tempo"] },
{ name:"Nita", hp:8000, role:"Control", gears:["Pet-Power","Schaden"] },
{ name:"Colt", hp:5600, role:"Shooter", gears:["Nachladen","Schaden"] },
{ name:"Bull", hp:10000, role:"Tank", gears:["Schaden","Schild"] },
{ name:"Brock", hp:4800, role:"Shooter", gears:["Schaden"] },
{ name:"El Primo", hp:12000, role:"Tank", gears:["Tempo"] },
{ name:"Barley", hp:4800, role:"Control", gears:["Schaden"] },
{ name:"Poco", hp:7400, role:"Support", gears:["Heilung"] },
{ name:"Rosa", hp:10000, role:"Tank", gears:["Schaden"] },
{ name:"Jessie", hp:6000, role:"Control", gears:["Pet-Power"] },
{ name:"Dynamike", hp:5600, role:"Thrower", gears:["Schaden"] },
{ name:"Tick", hp:4400, role:"Thrower", gears:["Schaden"] },
{ name:"8-Bit", hp:10000, role:"Damage", gears:["Schaden"] },
{ name:"Rico", hp:5600, role:"Shooter", gears:["Schaden"] },
{ name:"Darryl", hp:10600, role:"Tank", gears:["Tempo"] },
{ name:"Penny", hp:6400, role:"Control", gears:["Pet-Power"] },
{ name:"Carl", hp:8000, role:"Tank", gears:["Schaden"] },
{ name:"Jacky", hp:10000, role:"Tank", gears:["Tempo"] },
{ name:"Frank", hp:14000, role:"Tank", gears:["Schild"] }

];

//
// =========================
// 🧠 META ENGINE
// =========================
//

function meta(b){
    return (b.hp/1000) +
           (b.role==="Tank"?2:0) +
           (b.gears.includes("Schaden")?1:0);
}

function tier(m){
    if(m>=12) return "S";
    if(m>=10) return "A";
    if(m>=8) return "B";
    return "C";
}

//
// =========================
// 🔍 FILTER SYSTEM
// =========================
//

function getFiltered(){

    let search = document.getElementById("search").value.toLowerCase();
    let role = document.getElementById("roleFilter").value;

    return BRAWLERS.filter(b=>{

        let matchName = b.name.toLowerCase().includes(search);
        let matchRole = role==="ALL" || b.role===role;

        return matchName && matchRole;
    });

}

//
// =========================
// 🖥️ RENDER
// =========================
//

function render(){

const list=document.getElementById("list");
list.innerHTML="";

getFiltered()
.sort((a,b)=>meta(b)-meta(a))
.forEach(b=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h3>${b.name}</h3>
<p class="info">${b.role}</p>
<p>HP: ${b.hp}</p>
<p>Tier: ${tier(meta(b))}</p>
`;

div.onclick=()=>show(b);

list.appendChild(div);

});

}

//
// =========================
// 📊 DETAIL
// =========================
//

function show(b){

document.getElementById("detail").innerHTML=`
<h2>${b.name}</h2>
<p class="info">${b.role}</p>
<hr>
<p>HP: ${b.hp}</p>
<p class="good">Meta: ${meta(b)}</p>
<p>Tier: ${tier(meta(b))}</p>
`;

}

render();

</script>

</body>
</html>
